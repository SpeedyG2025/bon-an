      2:{ role:{fr:"Psychologue · Thérapie de groupe",ht:"Sikolojis · Terapi gwoup",en:"Psychologist · Group Therapy",es:"Psicólogo · Terapia grupal"}, desc:{fr:"Spécialiste en thérapie cognitive-comportementale et animateur de groupes de parole pour adultes et adolescents.",ht:"Espesyalis nan teyapi kognitif-konpòtmantal ak animatè gwoup lapawòl pou adilt ak adolesan.",en:"Specialist in cognitive-behavioural therapy and facilitator of discussion groups for adults and teenagers.",es:"Especialista en terapia cognitivo-conductual y facilitador de grupos de diálogo para adultos y adolescentes."}},
      3:{ role:{fr:"Travailleuse Sociale Senior",ht:"Travayè Sosyal Senyò",en:"Senior Social Worker",es:"Trabajadora Social Senior"}, desc:{fr:"Experte en intervention familiale et sociale. Coordinatrice du programme de soutien aux communautés rurales.",ht:"Ekspè nan entèvansyon familyal ak sosyal. Kowòdonatris pwogram sipò kominote riral yo.",en:"Expert in family and social intervention. Coordinator of the rural community support programme.",es:"Experta en intervención familiar y social. Coordinadora del programa de apoyo a comunidades rurales."}},
      4:{ role:{fr:"Psychologue · Enfants & Adolescents",ht:"Sikolojis · Timoun & Adolesan",en:"Psychologist · Children & Teenagers",es:"Psicólogo · Niños y Adolescentes"}, desc:{fr:"Psychologue scolaire et clinicien pour enfants. Responsable des programmes jeunesse de CAPSY.",ht:"Sikolojis eskolè ak klinik pou timoun. Responsab pwogram jènes CAPSY.",en:"School psychologist and clinician for children. Head of CAPSY's youth programmes.",es:"Psicólogo escolar y clínico para niños. Responsable de los programas juveniles de CAPSY."}},
      5:{ role:{fr:"Travailleuse Sociale · Formation",ht:"Travayè Sosyal · Fòmasyon",en:"Social Worker · Training",es:"Trabajadora Social · Formación"}, desc:{fr:"Formatrice certifiée en premiers secours psychologiques. Responsable du programme de formation des agents.",ht:"Formatris sètifye nan premye swen sikolojik. Responsab pwogram fòmasyon ajan yo.",en:"Certified trainer in psychological first aid. Head of the agent training programme.",es:"Formadora certificada en primeros auxilios psicológicos. Responsable del programa de formación de agentes."}},
      6:{ role:{fr:"Coordinatrice Administrative",ht:"Kowòdonatris Administratif",en:"Administrative Coordinator",es:"Coordinadora Administrativa"}, desc:{fr:"Gestionnaire des opérations quotidiennes et coordinatrice des rendez-vous. Garante de l'expérience client.",ht:"Jesyonè operasyon chak jou ak kowòdonatris randevou yo. Garanti eksperyans kliyan.",en:"Manager of daily operations and appointment coordinator. Guarantor of client experience.",es:"Gestora de operaciones diarias y coordinadora de citas. Garante de la experiencia del cliente."}},
    };

    function applyTeam() {
      const lang = CAPSY_LANG.current;
      document.querySelectorAll('[data-i18n-teamrole]').forEach(el => {
        const id = el.dataset.i18nTeamrole;
        el.textContent = TEAM[id]?.role[lang] || '';
      });
      document.querySelectorAll('[data-i18n-teamdesc]').forEach(el => {
        const id = el.dataset.i18nTeamdesc;
        el.textContent = TEAM[id]?.desc[lang] || '';
      });
    }

    const origApply = CAPSY_LANG.applyAll.bind(CAPSY_LANG);
    CAPSY_LANG.applyAll = function() { origApply(); applyTeam(); };
  </script>

  <script>applyTeam();</script>
