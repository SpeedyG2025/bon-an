  <script src="i18n.js"></script>
  <script>
    // "Sur place" label by lang
    const surplace = { fr:"Sur place", ht:"Sou plas", en:"On site", es:"En persona" };
    const origApply = CAPSYS_LANG.applyAll.bind(CAPSYS_LANG);
    CAPSYS_LANG.applyAll = function() {
      origApply();
      const el = document.querySelector('[data-i18n-surplace]');
      if (el) el.textContent = surplace[CAPSYS_LANG.current] || surplace.fr;
    };
  </script>
  <script src="main.js"></script>
  <script>
    // Date min
    const dateInput = document.getElementById('apptDate');
    if (dateInput) dateInput.setAttribute('min', new Date().toISOString().split('T')[0]);

    // Sur place label
    const spEl = document.querySelector('[data-i18n-surplace]');
    if (spEl) { const sp = {fr:"Sur place",ht:"Sou plas",en:"On site",es:"En persona"}; spEl.textContent = sp[CAPSYS_LANG.current] || sp.fr; }

    // Type card → hidden field
    document.querySelectorAll('.type-card').forEach(card => {
      card.addEventListener('click', () => {
        document.getElementById('hiddenType').value =
          card.dataset.type === 'psychologue' ? 'Psychologue' : 'Travailleur Social';
      });
    });

    // Payment → hidden field
    document.querySelectorAll('.pay-method').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('hiddenPay').value = btn.dataset.pay || btn.querySelector('span')?.textContent.trim() || '';
      });
    });

    // ── Formspree AJAX submit ──
    const apptForm = document.getElementById('apptForm');
    if (apptForm) {
      apptForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('apptBtn');
        btn.textContent = '⏳ Ap voye...';
        btn.disabled = true;

        // Capture values before reset
        const prenom   = apptForm.querySelector('[name=prenom]')?.value || '';
        const nom      = apptForm.querySelector('[name=nom]')?.value || '';
        const tel      = apptForm.querySelector('[name=telephone]')?.value || 'N/A';
        const date     = apptForm.querySelector('[name=date]')?.value || 'N/A';
        const heure    = apptForm.querySelector('[name=heure]')?.value || 'N/A';
        const type     = document.getElementById('hiddenType')?.value || 'N/A';
        const mode     = apptForm.querySelector('[name=mode]')?.value || 'N/A';

        try {
          const res = await fetch(apptForm.action, {
            method: 'POST',
            body: new FormData(apptForm),
            headers: { 'Accept': 'application/json' }
          });

          if (res.ok) {
            // Kache fòm, montre siksè
            document.getElementById('apptFormWrap').style.display = 'none';
            document.getElementById('apptSuccess').style.display = 'block';
            window.scrollTo(0, 0);

            // WhatsApp notifikasyon — ouvri otomatikman pou admin voye konfirmasyon
            const waText = encodeURIComponent(
              '🗓️ NOUVO RANDEVOU CAPSYS\n' +
              '──────────────────\n' +
              '👤 ' + prenom + ' ' + nom + '\n' +
              '📞 ' + tel + '\n' +
              '🏥 Service: ' + type + '\n' +
              '📅 Date: ' + date + ' à ' + heure + '\n' +
              '📍 Mode: ' + mode + '\n' +
              '──────────────────\n' +
              'Randevou resevwa via sit CAPSYS'
            );
            // Ouvri WhatsApp apre 1 segonn pou admin wè notifikasyon
            setTimeout(() => {
              window.open('https://wa.me/15612613988?text=' + waText, '_blank');
            }, 1000);

          } else {
            btn.textContent = '❌ Erè — Eseye ankò';
            btn.disabled = false;
          }
        } catch(err) {
          btn.textContent = '❌ Erè — Eseye ankò';
          btn.disabled = false;
        }
      });
    }
  </script>
