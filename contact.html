<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – CAPSY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="contact">
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><span class="logo-mark">C</span><span class="logo-text">CAPSY</span></a>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" data-i18n="shared.nav.home"></a></li>
        <li><a href="activities.html" data-i18n="shared.nav.activities"></a></li>
        <li><a href="appointments.html" data-i18n="shared.nav.appt"></a></li>
        <li><a href="about.html" data-i18n="shared.nav.about"></a></li>
        <li><a href="contact.html" class="active" data-i18n="shared.nav.contact"></a></li>
        <li><a href="donate.html" class="btn-donate-nav" data-i18n="shared.nav.donate"></a></li>
      </ul>
      <div class="lang-switcher nav-lang">
        <button class="lang-btn" data-lang="ht">HT</button>
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <p class="section-tag" data-i18n="contact.header_tag"></p>
      <h1 data-i18n="contact.header_h1"></h1>
      <p data-i18n="contact.header_sub"></p>
    </div>
  </header>

  <section class="section-pad">
    <div class="container">
      <div class="contact-grid">
        <div>
          <p class="section-tag" style="margin-bottom:20px" data-i18n="contact.coord_tag"></p>
          <h2 style="margin-bottom:40px">
            <span data-i18n="contact.coord_h2"></span><br/>
            <em data-i18n="contact.coord_em"></em>
          </h2>

          <div class="contact-info">
            <div class="contact-item">
              <div class="contact-icon">📍</div>
              <div>
                <h5 data-i18n="contact.addr_h"></h5>
                <p id="addrText"></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">📞</div>
              <div>
                <h5 data-i18n="contact.phone_h"></h5>
                <p>+509 XXXX XXXX<br/><span style="font-size:.8rem;color:var(--text-lt)" data-i18n="contact.phone_hours"></span></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">✉️</div>
              <div>
                <h5 data-i18n="contact.email_h"></h5>
                <p>contact@capsy.ht<br/><span style="font-size:.8rem;color:var(--text-lt)" data-i18n="contact.email_delay"></span></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">🕐</div>
              <div>
                <h5 data-i18n="contact.hours_h"></h5>
                <p id="hoursText"></p>
              </div>
            </div>
          </div>

          <div style="margin-top:40px;padding:28px;background:var(--cream);border-radius:var(--radius-lg)">
            <h5 style="margin-bottom:12px" data-i18n="contact.urg_h"></h5>
            <p style="font-size:.875rem;color:var(--text-md);margin-bottom:16px" data-i18n="contact.urg_p"></p>
            <a href="tel:+50900000000" class="btn-primary" style="display:inline-flex" data-i18n="contact.urg_btn"></a>
          </div>

          <div style="margin-top:24px;padding:24px;border:1px solid var(--border);border-radius:var(--radius-lg)">
            <h5 style="margin-bottom:14px" data-i18n="contact.social_h"></h5>
            <div style="display:flex;gap:16px">
              <a href="#" style="display:flex;align-items:center;gap:8px;color:var(--teal);font-size:.875rem;font-weight:500"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>CAPSY Haiti</a>
              <a href="#" style="display:flex;align-items:center;gap:8px;color:var(--teal);font-size:.875rem;font-weight:500"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>@capsyhaiti</a>
            </div>
          </div>
        </div>

        <!-- FORM -->
        <div>
          <div class="contact-form-card">
            <h3 style="margin-bottom:8px" data-i18n="contact.form_h3"></h3>
            <p style="color:var(--text-md);font-size:.875rem;margin-bottom:28px" data-i18n="contact.form_sub"></p>
            <form id="contactForm">
              <div class="form-row">
                <div class="form-group"><label data-i18n="contact.l_fname"></label><input type="text" required /></div>
                <div class="form-group"><label data-i18n="contact.l_lname"></label><input type="text" required /></div>
              </div>
              <div class="form-group"><label data-i18n="contact.l_email"></label><input type="email" required /></div>
              <div class="form-group"><label data-i18n="contact.l_phone"></label><input type="tel" placeholder="+509 XXXX XXXX" /></div>
              <div class="form-group">
                <label data-i18n="contact.l_subject"></label>
                <select data-i18n-options="contact.sub_opts"></select>
              </div>
              <div class="form-group">
                <label data-i18n="contact.l_msg"></label>
                <textarea style="min-height:140px" data-i18n="contact.p_msg" required></textarea>
              </div>
              <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:24px">
                <input type="checkbox" id="privacy" required style="width:18px;height:18px;margin-top:2px;flex-shrink:0;cursor:pointer" />
                <label for="privacy" style="font-size:.8rem;color:var(--text-md);cursor:pointer;line-height:1.5" data-i18n="contact.privacy"></label>
              </div>
              <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:16px;font-size:1rem" data-i18n="contact.btn_submit"></button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand"><div class="footer-logo"><span class="logo-mark">C</span><span class="logo-text">CAPSY</span></div><p data-i18n="shared.footer.tagline"></p><div class="footer-social"><a href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></a><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a></div></div>
        <div class="footer-col"><h5 data-i18n="shared.footer.nav_col"></h5><ul><li><a href="index.html" data-i18n="shared.nav.home"></a></li><li><a href="activities.html" data-i18n="shared.nav.activities"></a></li><li><a href="appointments.html" data-i18n="shared.nav.appt"></a></li><li><a href="about.html" data-i18n="shared.nav.about"></a></li><li><a href="contact.html" data-i18n="shared.nav.contact"></a></li></ul></div>
        <div class="footer-col"><h5 data-i18n="shared.footer.services"></h5><ul><li><a href="appointments.html" data-i18n="shared.footer.consult"></a></li><li><a href="appointments.html" data-i18n="shared.footer.social"></a></li></ul></div>
        <div class="footer-col"><h5 data-i18n="shared.footer.contact"></h5><ul><li>📍 Port-au-Prince, Haïti</li><li>📞 +509 XXXX XXXX</li><li>✉️ contact@capsy.ht</li></ul><a href="donate.html" class="btn-donate-footer" data-i18n="shared.footer.donate_btn"></a></div>
      </div>
      <div class="footer-bottom"><p data-i18n="shared.footer.copy"></p><div class="lang-switcher"><button class="lang-btn" data-lang="ht">HT</button><button class="lang-btn" data-lang="fr">FR</button><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="es">ES</button></div></div>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script>
    function applyMultiline() {
      const lang = CAPSY_LANG.current;
      const T = TRANSLATIONS.contact;
      const addrEl = document.getElementById('addrText');
      if (addrEl) addrEl.innerHTML = T.addr_p[lang].replace('\n','<br/>');
      const hoursEl = document.getElementById('hoursText');
      if (hoursEl) hoursEl.innerHTML = T.hours_p[lang].replace(/\n/g,'<br/>');
    }
    const origApply = CAPSY_LANG.applyAll.bind(CAPSY_LANG);
    CAPSY_LANG.applyAll = function() { origApply(); applyMultiline(); };
  </script>
  <script src="main.js"></script>
  <script>applyMultiline();</script>
</body>
</html>
