  <header class="page-header">
    <div class="container">
      <p class="section-tag" data-i18n="contact.header_tag"></p>
      <h1 data-i18n="contact.header_h1"></h1>
      <p data-i18n="contact.header_sub"></p>
    </div>
  </header>

  <section class="section-pad">
    <div class="container">
      <div class="contact-grid">
        <div>
          <p class="section-tag" style="margin-bottom:20px" data-i18n="contact.coord_tag"></p>
          <h2 style="margin-bottom:40px">
            <span data-i18n="contact.coord_h2"></span><br/>
            <em data-i18n="contact.coord_em"></em>
          </h2>

          <div class="contact-info">
            <div class="contact-item">
              <div class="contact-icon">📍</div>
              <div>
                <h5 data-i18n="contact.addr_h"></h5>
                <p id="addrText"></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">📞</div>
              <div>
                <h5 data-i18n="contact.phone_h"></h5>
                <p>+509 XXXX XXXX<br/><span style="font-size:.8rem;color:var(--text-lt)" data-i18n="contact.phone_hours"></span></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">✉️</div>
              <div>
                <h5 data-i18n="contact.email_h"></h5>
                <p>contact@capsys.ht<br/><span style="font-size:.8rem;color:var(--text-lt)" data-i18n="contact.email_delay"></span></p>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon">🕐</div>
              <div>
                <h5 data-i18n="contact.hours_h"></h5>
                <p id="hoursText"></p>
              </div>
            </div>
          </div>

          <!-- WhatsApp + SMS rapide -->
          <div style="margin-top:32px;display:flex;gap:12px;flex-wrap:wrap">
            <a href="https://wa.me/15612613988?text=Bonjour%20CAPSYS%2C%20je%20voudrais%20obtenir%20plus%20d%27informations."
               target="_blank"
               style="display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#fff;padding:13px 24px;border-radius:var(--radius-md);font-size:.875rem;font-weight:500;text-decoration:none;transition:opacity .2s"
               onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.118 1.528 5.845L.057 23.07a.75.75 0 00.916.918l5.347-1.488A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.714 9.714 0 01-4.964-1.364l-.355-.212-3.686 1.026 1.003-3.592-.232-.369A9.713 9.713 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
              WhatsApp
            </a>
            <a href="sms:+15612613988?body=Bonjour%20CAPSYS%2C%20je%20voudrais%20obtenir%20plus%20d%27informations."
               style="display:inline-flex;align-items:center;gap:10px;background:var(--teal);color:#fff;padding:13px 24px;border-radius:var(--radius-md);font-size:.875rem;font-weight:500;text-decoration:none;transition:opacity .2s"
               onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              SMS
            </a>
          </div>

          <div style="margin-top:32px;padding:28px;background:var(--cream);border-radius:var(--radius-lg)">
            <h5 style="margin-bottom:12px" data-i18n="contact.urg_h"></h5>
            <p style="font-size:.875rem;color:var(--text-md);margin-bottom:16px" data-i18n="contact.urg_p"></p>
            <a href="tel:+15612613988" class="btn-primary" style="display:inline-flex" data-i18n="contact.urg_btn"></a>
          </div>

          <div style="margin-top:24px;padding:24px;border:1px solid var(--border);border-radius:var(--radius-lg)">
            <h5 style="margin-bottom:14px" data-i18n="contact.social_h"></h5>
            <div style="display:flex;gap:16px">
              <a href="#" style="display:flex;align-items:center;gap:8px;color:var(--teal);font-size:.875rem;font-weight:500"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>CAPSYS Haiti</a>
              <a href="#" style="display:flex;align-items:center;gap:8px;color:var(--teal);font-size:.875rem;font-weight:500"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>@capsyshaiti</a>
            </div>
          </div>
        </div>

        <!-- FORM — Formspree -->
        <div>
          <div class="contact-form-card">
            <h3 style="margin-bottom:8px" data-i18n="contact.form_h3"></h3>
            <p style="color:var(--text-md);font-size:.875rem;margin-bottom:28px" data-i18n="contact.form_sub"></p>

            <!-- SUCCESS MESSAGE (caché par défaut) -->
            <div id="contactSuccess" style="display:none;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:var(--radius-md);padding:24px;text-align:center;margin-bottom:24px">
              <div style="font-size:2.5rem;margin-bottom:10px">✅</div>
              <strong style="display:block;color:#2e7d32;font-size:1rem;margin-bottom:6px">Mesaj ou a resevwa!</strong>
              <p style="color:#388e3c;font-size:.875rem">Nou pral kontakte ou trè vit. Mèsi!</p>
            </div>

            <form id="contactForm"
                  action="https://formspree.io/f/mreoboke"
                  method="POST">

              <!-- Champs cachés pour notifier via WhatsApp/SMS info -->
              <input type="hidden" name="_subject" value="📩 Nouvo mesaj CAPSYS — Contact" />
              <input type="hidden" name="_replyto" id="hidden_email" />

              <div class="form-row">
                <div class="form-group"><label data-i18n="contact.l_fname"></label><input type="text" name="prenom" required /></div>
                <div class="form-group"><label data-i18n="contact.l_lname"></label><input type="text" name="nom" required /></div>
              </div>
              <div class="form-group">
                <label data-i18n="contact.l_email"></label>
                <input type="email" name="email" id="emailField" required
                       oninput="document.getElementById('hidden_email').value=this.value" />
              </div>
              <div class="form-group">
                <label data-i18n="contact.l_phone"></label>
                <input type="tel" name="telephone" placeholder="+509 XXXX XXXX" />
              </div>
              <div class="form-group">
                <label data-i18n="contact.l_subject"></label>
                <select name="sujet" data-i18n-options="contact.sub_opts"></select>
              </div>
              <div class="form-group">
                <label data-i18n="contact.l_msg"></label>
                <textarea name="message" style="min-height:140px" data-i18n="contact.p_msg" required></textarea>
              </div>
              <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:24px">
                <input type="checkbox" id="privacy" required style="width:18px;height:18px;margin-top:2px;flex-shrink:0;cursor:pointer" />
                <label for="privacy" style="font-size:.8rem;color:var(--text-md);cursor:pointer;line-height:1.5" data-i18n="contact.privacy"></label>
              </div>
              <button type="submit" id="contactBtn" class="btn-primary" style="width:100%;justify-content:center;padding:16px;font-size:1rem" data-i18n="contact.btn_submit"></button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand"><div class="footer-logo"><span class="logo-mark">C</span><span class="logo-text">CAPSYS</span></div><p data-i18n="shared.footer.tagline"></p><div class="footer-social"><a href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></a><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a></div></div>
        <div class="footer-col"><h5 data-i18n="shared.footer.nav_col"></h5><ul><li><a href="index.html" data-i18n="shared.nav.home"></a></li><li><a href="activities.html" data-i18n="shared.nav.activities"></a></li><li><a href="appointments.html" data-i18n="shared.nav.appt"></a></li><li><a href="about.html" data-i18n="shared.nav.about"></a></li><li><a href="contact.html" data-i18n="shared.nav.contact"></a></li></ul></div>
        <div class="footer-col"><h5 data-i18n="shared.footer.services"></h5><ul><li><a href="appointments.html" data-i18n="shared.footer.consult"></a></li><li><a href="appointments.html" data-i18n="shared.footer.social"></a></li></ul></div>
        <div class="footer-col"><h5 data-i18n="shared.footer.contact"></h5><ul><li>📍 Port-au-Prince, Haïti</li><li>📞 +509 XXXX XXXX</li><li>✉️ contact@capsys.ht</li></ul><a href="donate.html" class="btn-donate-footer" data-i18n="shared.footer.donate_btn"></a></div>
      </div>
      <div class="footer-bottom"><p data-i18n="shared.footer.copy"></p><div class="lang-switcher"><button class="lang-btn" data-lang="ht">HT</button><button class="lang-btn" data-lang="fr">FR</button><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="es">ES</button></div></div>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script>
    function applyMultiline() {
      const lang = CAPSYS_LANG.current;
      const T = TRANSLATIONS.contact;
      const addrEl = document.getElementById('addrText');
      if (addrEl) addrEl.innerHTML = T.addr_p[lang].replace('\n','<br/>');
      const hoursEl = document.getElementById('hoursText');
      if (hoursEl) hoursEl.innerHTML = T.hours_p[lang].replace(/\n/g,'<br/>');
    }
    const origApply = CAPSYS_LANG.applyAll.bind(CAPSYS_LANG);
    CAPSYS_LANG.applyAll = function() { origApply(); applyMultiline(); };
  </script>
  <script src="main.js"></script>
  <script>
    applyMultiline();

    // ── Formspree AJAX submit ──
    const contactForm = document.getElementById('contactForm');
    if (contactForm) {
      contactForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('contactBtn');
        btn.textContent = '⏳ Ap voye...';
        btn.disabled = true;

        try {
          const res = await fetch(contactForm.action, {
            method: 'POST',
            body: new FormData(contactForm),
            headers: { 'Accept': 'application/json' }
          });

          if (res.ok) {
            // Montre mesaj siksè
            document.getElementById('contactSuccess').style.display = 'block';
            contactForm.reset();
            contactForm.style.display = 'none';

            // Notifikasyon WhatsApp otomatik (ouvri nan nouvo tab)
            const data = Object.fromEntries(new FormData(contactForm));
            const waMsg = encodeURIComponent(
              '📩 Nouvo mesaj CAPSYS!\n' +
              'Non: ' + (document.querySelector('[name=prenom]').value || '') + ' ' + (document.querySelector('[name=nom]').value || '') + '\n' +
              'Tel: ' + (document.querySelector('[name=telephone]').value || 'N/A') + '\n' +
              'Sujet: ' + (document.querySelector('[name=sujet]')?.value || 'N/A')
            );
            // Silently pre-fill WhatsApp (user can send manually if needed)
            window._lastContactWA = 'https://wa.me/15612613988?text=' + waMsg;
          } else {
            btn.textContent = '❌ Erè — Eseye ankò';
            btn.disabled = false;
          }
        } catch(err) {
          btn.textContent = '❌ Erè — Eseye ankò';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
