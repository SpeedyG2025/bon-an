  <script src="i18n.js"></script>
  <script src="main.js"></script>
  <script>
    // Render home activities (first 3) dynamically
    function renderHomeActivities() {
      const lang = CAPSY_LANG.current;
      const data = TRANSLATIONS.shared.activities_data;
      const grid = document.getElementById('homeActivities');
      if (!grid) return;
      grid.innerHTML = [1,2,3].map(id => {
        const a = data[id];
        return `<a href="activity-detail.html?id=${id}" class="activity-card">
          <div class="activity-img" style="background-image:url('${a.img}')"></div>
          <div class="activity-body">
            <span class="activity-tag">${a.tag[lang]}</span>
            <h4>${a.title[lang]}</h4>
            <p>${a.desc[lang]}</p>
            <span class="activity-date">${a.date}</span>
          </div>
        </a>`;
      }).join('');
    }

    function renderTestimonials() {
      const lang = CAPSYS_LANG.current;
      const T = TRANSLATIONS.index;
      const grid = document.getElementById('testiGrid');
      if (!grid) return;
      grid.innerHTML = `
        <div class="testimonial-card">
          <div class="testi-quote">"</div>
          <p>${T.t1[lang]}</p>
          <div class="testi-author"><div class="testi-avatar">M</div><div><strong>${T.t1_name}</strong><span>${T.t1_role[lang]}</span></div></div>
        </div>
        <div class="testimonial-card testimonial-card--accent">
          <div class="testi-quote">"</div>
          <p>${T.t2[lang]}</p>
          <div class="testi-author"><div class="testi-avatar">J</div><div><strong>${T.t2_name}</strong><span>${T.t2_role[lang]}</span></div></div>
        </div>
        <div class="testimonial-card">
          <div class="testi-quote">"</div>
          <p>${T.t3[lang]}</p>
          <div class="testi-author"><div class="testi-avatar">C</div><div><strong>${T.t3_name}</strong><span>${T.t3_role[lang]}</span></div></div>
        </div>`;
    }

    // Hook into language changes
    const origApplyAll = CAPSYS_LANG.applyAll.bind(CAPSYS_LANG);
    CAPSYS_LANG.applyAll = function() {
      origApplyAll();
      renderHomeActivities();
      renderTestimonials();
    };

    renderHomeActivities();
    renderTestimonials();
  </script>
