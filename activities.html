  <script src="i18n.js"></script>
  <script>
    // filter categories per activity ID
    const CATS = {1:'workshop',2:'awareness',3:'training',4:'community',5:'workshop',6:'awareness'};
    let activeFilter = 'all';

    function renderGrid() {
      const lang = CAPSYS_LANG.current;
      const data = TRANSLATIONS.shared.activities_data;
      const grid = document.getElementById('actGrid');
      grid.innerHTML = Object.keys(data).map(id => {
        const a = data[id];
        const cat = CATS[id];
        const hidden = activeFilter !== 'all' && activeFilter !== cat ? 'style="display:none"' : '';
        return `<a href="activity-detail.html?id=${id}" class="activity-card" data-cat="${cat}" ${hidden}>
          <div class="activity-img" style="background-image:url('${a.img}')"></div>
          <div class="activity-body">
            <span class="activity-tag">${a.tag[lang]}</span>
            <h4>${a.title[lang]}</h4>
            <p>${a.desc[lang]}</p>
            <span class="activity-date">${a.date}</span>
          </div>
        </a>`;
      }).join('');

      // filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.querySelectorAll('.activity-card').forEach(card => {
            card.style.display = (activeFilter === 'all' || card.dataset.cat === activeFilter) ? '' : 'none';
          });
        });
      });
    }

    const origApply = CAPSYS_LANG.applyAll.bind(CAPSYS_LANG);
    CAPSYS_LANG.applyAll = function() { origApply(); renderGrid(); };
  </script>
  <script src="main.js"></script>
  <script>renderGrid();</script>

</html>
